# Supplement to alert_rules.yml: Postgres / RabbitMQ / Redis exporter thresholds.
# Loaded only by observability/prometheus.server.yml (production observability stack).
groups:
  - name: infrastructure_exporters
    rules:
      - alert: HighPostgresConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Postgres connection count"
          description: "Active connections: {{ $value }}."

      - alert: RabbitMQQueueBacklog
        expr: rabbitmq_queue_messages > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue backlog on {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} has {{ $value }} messages."

      - alert: HighRedisMemory
        expr: redis_memory_max_bytes > 0 and redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 80%"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory."
