apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: getsale
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: getsale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: getsale
    spec:
      containers:
        - name: frontend
          image: getsale/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: getsale-common-config
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: NEXT_PUBLIC_WS_URL
            - name: API_URL
              value: http://gateway.getsale.svc.cluster.local:8000
            - name: NEXT_PUBLIC_DOMAIN_WS_PROXY
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: getsale
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: getsale
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
