apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-api
  namespace: getsale
  labels:
    app.kubernetes.io/name: messaging-api
    app.kubernetes.io/part-of: getsale
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: messaging-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: messaging-api
        app.kubernetes.io/part-of: getsale
    spec:
      containers:
        - name: messaging-api
          image: getsale/messaging-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: getsale-common-config
            - secretRef:
                name: getsale-secrets
          env:
            - name: PORT
              value: "4003"
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: messaging-api
  namespace: getsale
  labels:
    app.kubernetes.io/name: messaging-api
    app.kubernetes.io/part-of: getsale
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: messaging-api
  ports:
    - port: 4003
      targetPort: 4003
      protocol: TCP
