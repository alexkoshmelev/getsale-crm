apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-sm
  namespace: getsale-v2
  labels:
    app.kubernetes.io/name: telegram-sm
    app.kubernetes.io/part-of: getsale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telegram-sm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telegram-sm
        app.kubernetes.io/part-of: getsale
    spec:
      containers:
        - name: telegram-sm
          image: getsale/telegram-sm:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4005
              protocol: TCP
          envFrom:
            - configMapRef:
                name: getsale-common-config
            - secretRef:
                name: getsale-secrets
          env:
            - name: PORT
              value: "4005"
            - name: TELEGRAM_API_ID
              valueFrom:
                secretKeyRef:
                  name: getsale-secrets
                  key: TELEGRAM_API_ID
            - name: TELEGRAM_API_HASH
              valueFrom:
                secretKeyRef:
                  name: getsale-secrets
                  key: TELEGRAM_API_HASH
            - name: SESSION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: getsale-secrets
                  key: SESSION_ENCRYPTION_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-sm
  namespace: getsale-v2
  labels:
    app.kubernetes.io/name: telegram-sm
    app.kubernetes.io/part-of: getsale
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: telegram-sm
  ports:
    - port: 4005
      targetPort: 4005
      protocol: TCP
