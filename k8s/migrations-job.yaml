apiVersion: batch/v1
kind: Job
metadata:
  name: migrations
  namespace: getsale-v2
  labels:
    app: migrations
    app.kubernetes.io/part-of: getsale
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrations
        app.kubernetes.io/part-of: getsale
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.getsale-v2.svc.cluster.local -p 5432 -U postgres; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: migrations
          image: getsale/migrations:latest  # Built from docker/migrations/Dockerfile
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: getsale-secrets
                  key: DATABASE_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: getsale-config
                  key: NODE_ENV
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
