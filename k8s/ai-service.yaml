apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: getsale
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: getsale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-service
        app.kubernetes.io/part-of: getsale
    spec:
      containers:
        - name: ai-service
          image: getsale/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4010
              protocol: TCP
          envFrom:
            - configMapRef:
                name: getsale-common-config
            - secretRef:
                name: getsale-secrets
          env:
            - name: PORT
              value: "4010"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: getsale-secrets
                  key: OPENAI_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: getsale-secrets
                  key: OPENROUTER_API_KEY
            - name: OPENROUTER_CAMPAIGN_MODEL
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: OPENROUTER_CAMPAIGN_MODEL
            - name: OPENROUTER_AUTO_RESPOND_MODEL
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: OPENROUTER_AUTO_RESPOND_MODEL
            - name: OPENROUTER_CHAT_SUMMARIZE_MODEL
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: OPENROUTER_CHAT_SUMMARIZE_MODEL
            - name: OPENROUTER_MODEL
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: OPENROUTER_MODEL
            - name: OPENROUTER_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: OPENROUTER_MAX_TOKENS
            - name: OPENROUTER_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: getsale-common-config
                  key: OPENROUTER_TIMEOUT_MS
          readinessProbe:
            httpGet:
              path: /health
              port: 4010
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4010
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: getsale
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: getsale
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-service
  ports:
    - port: 4010
      targetPort: 4010
      protocol: TCP
