apiVersion: v1
kind: ConfigMap
metadata:
  name: getsale-common-config
  namespace: getsale
  labels:
    app.kubernetes.io/part-of: getsale
data:
  NODE_ENV: "development"
  CORS_ORIGIN: "http://localhost:8000,http://localhost:3000,http://localhost:5173"
  COOKIE_DOMAIN: ""
  FRONTEND_URL: "http://localhost:8000"
  PUBLIC_API_BASE_URL: "http://localhost:8000"
  NEXT_PUBLIC_API_URL: "http://localhost:8000"
  NEXT_PUBLIC_WS_URL: "ws://localhost:4008"

  # Internal service URLs (K8s DNS)
  AUTH_SERVICE_URL: "http://auth-service.getsale.svc.cluster.local:4001"
  CORE_API_SERVICE_URL: "http://core-api.getsale.svc.cluster.local:4002"
  MESSAGING_SERVICE_URL: "http://messaging-api.getsale.svc.cluster.local:4003"
  TELEGRAM_SERVICE_URL: "http://telegram-sm.getsale.svc.cluster.local:4005"
  CAMPAIGN_SERVICE_URL: "http://campaign-orchestrator.getsale.svc.cluster.local:4006"
  AUTOMATION_SERVICE_URL: "http://automation-engine.getsale.svc.cluster.local:4007"
  NOTIFICATION_HUB_URL: "http://notification-hub.getsale.svc.cluster.local:4008"
  ANALYTICS_SERVICE_URL: "http://core-api.getsale.svc.cluster.local:4002"
  USER_SERVICE_URL: "http://user-service.getsale.svc.cluster.local:4009"
  AI_SERVICE_URL: "http://ai-service.getsale.svc.cluster.local:4010"
  FRONTEND_SERVICE_URL: "http://frontend.getsale.svc.cluster.local:3000"

  # AI model configuration
  OPENROUTER_CAMPAIGN_MODEL: "@preset/copyright"
  OPENROUTER_AUTO_RESPOND_MODEL: "google/gemma-3-27b-it:free"
  OPENROUTER_CHAT_SUMMARIZE_MODEL: "google/gemma-3-27b-it:free"
  OPENROUTER_MODEL: ""
  OPENROUTER_MAX_TOKENS: "4096"
  OPENROUTER_TIMEOUT_MS: "30000"

  # Worker / campaign tuning
  WORKER_CONCURRENCY: "1"
  CAMPAIGN_MAX_SENDS_PER_ACCOUNT_PER_DAY: "40"
  SYNC_MESSAGES_MAX_AGE_DAYS: "30"

  # Payments
  NOWPAYMENTS_PAY_CURRENCY: "usdtbsc"
  STRIPE_PRICE_CREDITS_SMALL: ""
  STRIPE_PRICE_CREDITS_MEDIUM: ""
  STRIPE_PRICE_CREDITS_LARGE: ""
  CREDITS_MOCK_TOPUP: ""
