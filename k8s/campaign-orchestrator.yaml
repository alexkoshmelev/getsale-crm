apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaign-orchestrator
  namespace: getsale-v2
  labels:
    app.kubernetes.io/name: campaign-orchestrator
    app.kubernetes.io/part-of: getsale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: campaign-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: campaign-orchestrator
        app.kubernetes.io/part-of: getsale
    spec:
      containers:
        - name: campaign-orchestrator
          image: getsale/campaign-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4006
              protocol: TCP
          envFrom:
            - configMapRef:
                name: getsale-common-config
            - secretRef:
                name: getsale-secrets
          env:
            - name: PORT
              value: "4006"
          readinessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: campaign-orchestrator
  namespace: getsale-v2
  labels:
    app.kubernetes.io/name: campaign-orchestrator
    app.kubernetes.io/part-of: getsale
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: campaign-orchestrator
  ports:
    - port: 4006
      targetPort: 4006
      protocol: TCP
