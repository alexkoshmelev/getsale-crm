# Production observability: merge with docker-compose.server.yml (same project name: getsale-crm).
# Usage on server: docker compose -f docker-compose.server.yml -f docker-compose.observability.prod.yml up -d
#
# Requires .env next to compose: GRAFANA_HOST, GF_SECURITY_ADMIN_PASSWORD, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID,
# POSTGRES_PASSWORD, REDIS_PASSWORD (same as app stack).
#
# Grafana: HTTPS via Traefik (Host rule). Do not publish Grafana port 3000 to the public internet.
# Production: GRAFANA_HOST=grafana-app.getsale.ai → https://grafana-app.getsale.ai
#
# Host sizing (current droplet): DigitalOcean AMS3 — dev-api-getsale-ai — 16 GB RAM / 50 GB disk.
# deploy.resources below fit that profile; if OOM or disk full, lower Loki/Prometheus retention or limits here.

name: getsale-crm

x-logging: &obs-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: getsale-crm-alertmanager
    restart: unless-stopped
    logging: *obs-logging
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./observability/alertmanager/alertmanager-template.yml:/etc/alertmanager/alertmanager-template.yml:ro
      - ./observability/alertmanager/entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    command:
      - "--storage.path=/alertmanager"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: getsale-crm-prometheus
    restart: unless-stopped
    logging: *obs-logging
    volumes:
      - ./observability/prometheus.server.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
      - ./infrastructure/prometheus/exporter_infra_alerts.yml:/etc/prometheus/rules/exporter_infra_alerts.yml:ro
      - prometheus_prod_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

  grafana:
    image: grafana/grafana:11.3.0
    container_name: getsale-crm-grafana
    restart: unless-stopped
    logging: *obs-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}/
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.getsale-crm-grafana.rule=Host(`${GRAFANA_HOST}`)"
      - "traefik.http.routers.getsale-crm-grafana.entrypoints=websecure"
      - "traefik.http.routers.getsale-crm-grafana.tls.certresolver=myresolver"
      - "traefik.http.routers.getsale-crm-grafana.middlewares=security-headers"
      - "traefik.http.services.getsale-crm-grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  loki:
    image: grafana/loki:3.1.0
    container_name: getsale-crm-loki
    restart: unless-stopped
    logging: *obs-logging
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_prod_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 1024M

  promtail:
    image: grafana/promtail:3.1.0
    container_name: getsale-crm-promtail
    restart: unless-stopped
    logging: *obs-logging
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: getsale-crm-redis-exporter
    restart: unless-stopped
    logging: *obs-logging
    environment:
      REDIS_ADDR: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: getsale-crm-postgres-exporter
    restart: unless-stopped
    logging: *obs-logging
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable
    depends_on:
      - postgres

networks:
  traefik:
    name: traefik
    external: true

volumes:
  prometheus_prod_data:
  grafana_prod_data:
  loki_prod_data:
