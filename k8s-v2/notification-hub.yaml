apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-hub
  namespace: getsale-v2
  labels:
    app.kubernetes.io/name: notification-hub
    app.kubernetes.io/part-of: getsale
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-hub
        app.kubernetes.io/part-of: getsale
    spec:
      containers:
        - name: notification-hub
          image: getsale/notification-hub:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4008
              protocol: TCP
          envFrom:
            - configMapRef:
                name: getsale-common-config
            - secretRef:
                name: getsale-secrets
          env:
            - name: PORT
              value: "4008"
          readinessProbe:
            httpGet:
              path: /health
              port: 4008
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4008
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-hub
  namespace: getsale-v2
  labels:
    app.kubernetes.io/name: notification-hub
    app.kubernetes.io/part-of: getsale
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notification-hub
  ports:
    - port: 4008
      targetPort: 4008
      protocol: TCP
