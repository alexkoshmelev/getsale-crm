# V2 Backend — local development
# Start:  docker compose -f docker-compose.v2.yml up --build
# Scale:  docker compose -f docker-compose.v2.yml up --build --scale campaign-worker=3
# Ports use different host offsets from the old stack so both can coexist.
#
# Local:     http://localhost:5173  (frontend direct)
#            http://localhost:8000  (gateway — API + WS + frontend proxy)
# Domain:    Point Cloudflare Tunnel to http://localhost:8000
#            Gateway proxies /api/*, /socket.io/*, and /* (frontend) — everything on one port.
# Secrets:   Reads from .env (JWT, CORS, cookies, API keys). See .env.example.

services:
  # ─── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: getsale
      RABBITMQ_DEFAULT_PASS: getsale_dev
    ports:
      - "5673:5672"
      - "15673:15672"
      - "15693:15692"
    volumes:
      - ./observability/rabbitmq-plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Migrations (run once, then exit) ────────────────────────
  migrations:
    build:
      context: .
      dockerfile: docker/migrations/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Gateway ────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: gateway
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: "8000"
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3000,https://dev-app.getsale.ai}
      FRONTEND_ORIGIN: ${FRONTEND_URL:-http://localhost:5173}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      AUTH_COOKIE_ACCESS: ${AUTH_COOKIE_ACCESS:-access_token_dev}
      AUTH_SERVICE_URL: http://auth-service:4001
      CORE_API_SERVICE_URL: http://core-api:4002
      MESSAGING_SERVICE_URL: http://messaging-api:4003
      TELEGRAM_SERVICE_URL: http://telegram-sm:4005
      CAMPAIGN_SERVICE_URL: http://campaign-orchestrator:4006
      AUTOMATION_SERVICE_URL: http://automation-engine:4007
      NOTIFICATION_HUB_URL: http://notification-hub:4008
      ANALYTICS_SERVICE_URL: http://core-api:4002
      USER_SERVICE_URL: http://user-service:4009
      AI_SERVICE_URL: http://ai-service:4010
      FRONTEND_SERVICE_URL: http://frontend:3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Auth Service ───────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: auth-service
    environment:
      NODE_ENV: development
      PORT: "4001"
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_prod}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3000,https://dev-app.getsale.ai}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      AUTH_COOKIE_ACCESS: ${AUTH_COOKIE_ACCESS:-access_token_dev}
      AUTH_COOKIE_REFRESH: ${AUTH_COOKIE_REFRESH:-refresh_token_dev}
      AUTH_RL_SIGNUP: "${AUTH_RL_SIGNUP:-500}"
      AUTH_RL_SIGNIN_IP: "${AUTH_RL_SIGNIN_IP:-500}"
      AUTH_RL_SIGNIN_EMAIL: "${AUTH_RL_SIGNIN_EMAIL:-100}"
      AUTH_RL_REFRESH: "${AUTH_RL_REFRESH:-500}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Core API (CRM + Pipeline + Team + Activity) ───────────
  core-api:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: core-api
    environment:
      NODE_ENV: development
      PORT: "4002"
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      TELEGRAM_SERVICE_URL: http://telegram-sm:4005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Messaging API ─────────────────────────────────────────
  messaging-api:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: messaging-api
    environment:
      NODE_ENV: development
      PORT: "4003"
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Telegram Session Manager ──────────────────────────────
  telegram-sm:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: telegram-session-manager
    environment:
      NODE_ENV: development
      PORT: "4005"
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      TELEGRAM_API_ID: "${TELEGRAM_API_ID:-0}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH:-placeholder}"
      SESSION_ENCRYPTION_KEY: "${SESSION_ENCRYPTION_KEY:-dev_session_encryption_key_32bytes}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Campaign Orchestrator ─────────────────────────────────
  campaign-orchestrator:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: campaign-orchestrator
    environment:
      NODE_ENV: development
      PORT: "4006"
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Campaign Worker (scale with --scale campaign-worker=N) ─
  campaign-worker:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: campaign-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: "1"
      AI_SERVICE_URL: http://ai-service:4010
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Automation Engine ─────────────────────────────────────
  automation-engine:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: automation-engine
    environment:
      NODE_ENV: development
      PORT: "4007"
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── User Service ──────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: user-service
    environment:
      NODE_ENV: development
      PORT: "4009"
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      NOWPAYMENTS_API_KEY: "${NOWPAYMENTS_API_KEY:-}"
      NOWPAYMENTS_IPN_SECRET: "${NOWPAYMENTS_IPN_SECRET:-}"
      NOWPAYMENTS_PAY_CURRENCY: "${NOWPAYMENTS_PAY_CURRENCY:-usdtbsc}"
      STRIPE_PRICE_CREDITS_SMALL: "${STRIPE_PRICE_CREDITS_SMALL:-}"
      STRIPE_PRICE_CREDITS_MEDIUM: "${STRIPE_PRICE_CREDITS_MEDIUM:-}"
      STRIPE_PRICE_CREDITS_LARGE: "${STRIPE_PRICE_CREDITS_LARGE:-}"
      CREDITS_MOCK_TOPUP: "${CREDITS_MOCK_TOPUP:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── AI Service ────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: ai-service
    environment:
      NODE_ENV: development
      PORT: "4010"
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_CAMPAIGN_MODEL: "${OPENROUTER_CAMPAIGN_MODEL:-@preset/copyright}"
      OPENROUTER_AUTO_RESPOND_MODEL: "${OPENROUTER_AUTO_RESPOND_MODEL:-google/gemma-3-27b-it:free}"
      OPENROUTER_CHAT_SUMMARIZE_MODEL: "${OPENROUTER_CHAT_SUMMARIZE_MODEL:-google/gemma-3-27b-it:free}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-}"
      OPENROUTER_MAX_TOKENS: "${OPENROUTER_MAX_TOKENS:-4096}"
      OPENROUTER_TIMEOUT_MS: "${OPENROUTER_TIMEOUT_MS:-30000}"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Notification Hub ──────────────────────────────────────
  notification-hub:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: notification-hub
    ports:
      - "4008:4008"
    environment:
      NODE_ENV: development
      PORT: "4008"
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3000,https://dev-app.getsale.ai}
      AUTH_COOKIE_ACCESS: ${AUTH_COOKIE_ACCESS:-access_token_dev}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Analytics Worker ──────────────────────────────────────
  analytics-worker:
    build:
      context: .
      dockerfile: services-v2/Dockerfile.template
      args:
        SERVICE: analytics-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres_dev@postgres:5432/postgres
      RABBITMQ_URL: amqp://getsale:getsale_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Frontend (Next.js dev server with HMR) ──────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    ports:
      - "5173:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:4008
      API_URL: http://gateway:8000
      NEXT_PUBLIC_DOMAIN_WS_PROXY: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      gateway:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pg_data_v2:
  frontend_node_modules:
  frontend_next:
