# Server Docker Compose for GetSale CRM (production)
# This file is used on the remote server to run the production stack (services images).
# All app images are pulled from the DigitalOcean registry.
#
# deploy.resources: honored by `docker stack deploy` (Swarm). On `docker compose up`, Engine may
# apply limits depending on version; if not, use host cgroups or document in DEPLOYMENT.md.
# Set REGISTRY in .env to override (default: registry.digitalocean.com/regestry-getsale-ai)
#
# Required in .env (copy from .env.example §2 — production): POSTGRES_PASSWORD, REDIS_PASSWORD,
# RABBITMQ_PASSWORD, JWT_SECRET, JWT_REFRESH_SECRET, INTERNAL_AUTH_SECRET. Services use
# RABBITMQ_URL built from RABBITMQ_PASSWORD (amqp://getsale:${RABBITMQ_PASSWORD}@rabbitmq:5672).
#
# Required env per service (must appear in each service's environment: block or service fails at startup):
#   gateway:                JWT_SECRET, INTERNAL_AUTH_SECRET, CORS_ORIGIN (prod), REDIS_URL, AUTH_COOKIE_ACCESS, *_SERVICE_URL
#   auth-service:           JWT_SECRET, JWT_REFRESH_SECRET, INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL, COOKIE_DOMAIN, AUTH_COOKIE_*
#   core-api:               INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL, TELEGRAM_SERVICE_URL
#   messaging-api:          INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL
#   telegram-sm:            INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL, TELEGRAM_API_ID, TELEGRAM_API_HASH, SESSION_ENCRYPTION_KEY
#   campaign-orchestrator:  INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL
#   campaign-worker:        INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL, AI_SERVICE_URL; headless (no PORT)
#   automation-engine:      INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL
#   notification-hub:       JWT_SECRET, REDIS_URL, RABBITMQ_URL, CORS_ORIGIN, AUTH_COOKIE_ACCESS
#   user-service:           INTERNAL_AUTH_SECRET, DATABASE_URL, REDIS_URL, RABBITMQ_URL; STRIPE_* / NOWPAYMENTS_* optional
#   ai-service:             INTERNAL_AUTH_SECRET, REDIS_URL, RABBITMQ_URL; OPENAI_API_KEY optional; OPENROUTER_* optional
#   analytics-worker:       DATABASE_URL, REDIS_URL, RABBITMQ_URL; headless (no PORT)
#
# name: fixes project name so "compose down" targets only this stack (run from /docker/getsale-crm)
#
# Capacity (typical single droplet: 16 GB RAM / 50 GB disk, e.g. DO AMS3 dev-api-getsale-ai):
# deploy.resources caps worst-case RAM per service; verify with `docker inspect … HostConfig.Memory`.
# If the host OOMs, raise limits only where justified or add limits to services that have none — see DEPLOYMENT.md.
name: getsale-crm

# Log rotation (aligns with ~50 GB disk droplets): avoids unbounded json-file growth on the host.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ==================== Infrastructure ====================
  postgres:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: getsale-crm-postgres
    restart: unless-stopped
    logging: *default-logging
    shm_size: "256mb"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    # Loopback only: use SSH -L 5435:127.0.0.1:5435 from home, or see DEPLOYMENT.md for public bind + firewall.
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: getsale-crm-redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./.data/redis:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: getsale-crm-rabbitmq
    restart: unless-stopped
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: getsale
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-set_me_in_env}
    volumes:
      - ./.data/rabbitmq:/var/lib/rabbitmq
      # Prometheus scrapes :15692/metrics (see observability/prometheus.server.yml)
      - ./observability/rabbitmq-plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 1024M

  pgbouncer:
    image: edoburu/pgbouncer:v1.19.1-p0
    container_name: getsale-crm-pgbouncer
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 300
      DEFAULT_POOL_SIZE: 30
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ==================== Migrations (run once on deploy) ====================
  # Host getsale-crm-postgres avoids resolving to another stack's "postgres" container
  migrations:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:migrations
    container_name: getsale-crm-migrations
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@getsale-crm-postgres:5432/postgres
      - NODE_ENV=production
      # Optional: RUN_SEEDS=true to load demo seeds on deploy (default skips seeds in production)
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  # ==================== App services (from registry) ====================

  # ─── Gateway ────────────────────────────────────────────────
  gateway:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:gateway
    container_name: getsale-crm-gateway
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-https://app.getsale.ai}
      - FRONTEND_ORIGIN=${FRONTEND_URL:-https://app.getsale.ai}
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
      - AUTH_COOKIE_ACCESS=${AUTH_COOKIE_ACCESS:-access_token}
      - AUTH_SERVICE_URL=http://auth-service:4001
      - CORE_API_SERVICE_URL=http://core-api:4002
      - MESSAGING_SERVICE_URL=http://messaging-api:4003
      - TELEGRAM_SERVICE_URL=http://telegram-sm:4005
      - CAMPAIGN_SERVICE_URL=http://campaign-orchestrator:4006
      - AUTOMATION_SERVICE_URL=http://automation-engine:4007
      - NOTIFICATION_HUB_URL=http://notification-hub:4008
      - ANALYTICS_SERVICE_URL=http://core-api:4002
      - USER_SERVICE_URL=http://user-service:4009
      - AI_SERVICE_URL=http://ai-service:4010
      - FRONTEND_SERVICE_URL=http://frontend:3000
    depends_on:
      redis: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }
    healthcheck:
      # 127.0.0.1: Node listens on 0.0.0.0 (IPv4); `localhost` may resolve to ::1 first and fail.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.getsale-crm-api.rule=Host(`api-crm.getsale.ai`)"
      - "traefik.http.routers.getsale-crm-api.entrypoints=websecure"
      - "traefik.http.routers.getsale-crm-api.tls.certresolver=myresolver"
      - "traefik.http.routers.getsale-crm-api.middlewares=security-headers"
      - "traefik.http.services.getsale-crm-api.loadbalancer.server.port=8000"
      # Per-service transport.* labels are invalid on Traefik v3; use entrypoint timeouts on websecure (see Traefik compose).

  # ─── Auth Service ───────────────────────────────────────────
  auth-service:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:auth-service
    container_name: getsale-crm-auth-service
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://app.getsale.ai}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.getsale.ai}
      - AUTH_COOKIE_ACCESS=${AUTH_COOKIE_ACCESS:-access_token}
      - AUTH_COOKIE_REFRESH=${AUTH_COOKIE_REFRESH:-refresh_token}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }

  # ─── Core API (CRM + Pipeline + Team + Activity) ───────────
  core-api:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:core-api
    container_name: getsale-crm-core-api
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4002
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
      - TELEGRAM_SERVICE_URL=http://telegram-sm:4005
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }

  # ─── Messaging API ─────────────────────────────────────────
  messaging-api:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:messaging-api
    container_name: getsale-crm-messaging-api
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4003
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }

  # ─── Telegram Session Manager ──────────────────────────────
  telegram-sm:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:telegram-session-manager
    container_name: getsale-crm-telegram-sm
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4005
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

  # ─── Campaign Orchestrator ─────────────────────────────────
  campaign-orchestrator:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:campaign-orchestrator
    container_name: getsale-crm-campaign-orchestrator
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4006
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }

  # ─── Campaign Worker (headless; scale with --scale campaign-worker=N) ─
  # No container_name: required so compose can assign unique names per replica.
  campaign-worker:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:campaign-worker
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-1}
      - AI_SERVICE_URL=http://ai-service:4010
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }
    deploy:
      resources:
        limits:
          cpus: "1.25"
          memory: 1536M

  # ─── Automation Engine ─────────────────────────────────────
  automation-engine:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:automation-engine
    container_name: getsale-crm-automation-engine
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4007
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }

  # ─── Notification Hub (Socket.IO): CORS_ORIGIN must match frontend origin ─
  notification-hub:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:notification-hub
    container_name: getsale-crm-notification-hub
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4008
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://app.getsale.ai}
      - AUTH_COOKIE_ACCESS=${AUTH_COOKIE_ACCESS:-access_token}
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.getsale-crm-ws.rule=Host(`ws-crm.getsale.ai`)"
      - "traefik.http.routers.getsale-crm-ws.entrypoints=websecure"
      - "traefik.http.routers.getsale-crm-ws.tls.certresolver=myresolver"
      - "traefik.http.routers.getsale-crm-ws.middlewares=security-headers"
      - "traefik.http.services.getsale-crm-ws.loadbalancer.server.port=4008"
      # Flush WebSocket/Socket.IO frames immediately (avoids buffering and timeouts behind proxy)
      - "traefik.http.services.getsale-crm-ws.loadbalancer.responseForwarding.flushInterval=1ms"

  # ─── User Service ──────────────────────────────────────────
  user-service:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:user-service
    container_name: getsale-crm-user-service
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4009
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.getsale.ai}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-https://api-crm.getsale.ai}
      - NOWPAYMENTS_API_KEY=${NOWPAYMENTS_API_KEY:-}
      - NOWPAYMENTS_IPN_SECRET=${NOWPAYMENTS_IPN_SECRET:-}
      - NOWPAYMENTS_PAY_CURRENCY=${NOWPAYMENTS_PAY_CURRENCY:-usdtbsc}
      - STRIPE_PRICE_CREDITS_SMALL=${STRIPE_PRICE_CREDITS_SMALL:-}
      - STRIPE_PRICE_CREDITS_MEDIUM=${STRIPE_PRICE_CREDITS_MEDIUM:-}
      - STRIPE_PRICE_CREDITS_LARGE=${STRIPE_PRICE_CREDITS_LARGE:-}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }

  # ─── AI Service ────────────────────────────────────────────
  ai-service:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:ai-service
    container_name: getsale-crm-ai-service
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=4010
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # OPENROUTER_API_KEY required for campaign rephrase and any OpenRouter routes
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Per-feature models (override in .env); do not use a single OPENROUTER_MODEL for all
      - OPENROUTER_CAMPAIGN_MODEL=${OPENROUTER_CAMPAIGN_MODEL:-@preset/copyright}
      - OPENROUTER_AUTO_RESPOND_MODEL=${OPENROUTER_AUTO_RESPOND_MODEL:-google/gemma-3-27b-it:free}
      - OPENROUTER_CHAT_SUMMARIZE_MODEL=${OPENROUTER_CHAT_SUMMARIZE_MODEL:-google/gemma-3-27b-it:free}
      # Legacy fallback; leave empty if per-feature models are set above
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - OPENROUTER_MAX_TOKENS=${OPENROUTER_MAX_TOKENS:-2048}
      - OPENROUTER_TIMEOUT_MS=${OPENROUTER_TIMEOUT_MS:-55000}
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

  # ─── Analytics Worker (headless — no PORT) ─────────────────
  analytics-worker:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:analytics-worker
    container_name: getsale-crm-analytics-worker
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      - RABBITMQ_URL=amqp://getsale:${RABBITMQ_PASSWORD:-set_me_in_env}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }

  # ─── Frontend from registry ────────────────────────────────
  frontend:
    image: ${REGISTRY:-registry.digitalocean.com/regestry-getsale-ai}/getsale-crm:frontend
    container_name: getsale-crm-frontend
    restart: unless-stopped
    init: true
    logging: *default-logging
    environment:
      - NODE_ENV=production
      # SSR / server-side fetches: reach gateway on Docker network (browser uses NEXT_PUBLIC_* from image build)
      - API_URL=http://gateway:8000
    depends_on:
      gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.getsale-crm.rule=Host(`app.getsale.ai`)"
      - "traefik.http.routers.getsale-crm.entrypoints=websecure"
      - "traefik.http.routers.getsale-crm.tls.certresolver=myresolver"
      - "traefik.http.routers.getsale-crm.middlewares=security-headers"
      - "traefik.http.services.getsale-crm.loadbalancer.server.port=3000"

networks:
  default:
