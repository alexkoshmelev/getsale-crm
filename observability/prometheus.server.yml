# Production observability (used with docker-compose.observability.prod.yml).
# Scrape targets use Docker Compose service names from docker-compose.server.yml (same project network).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/alert_rules.yml
  - /etc/prometheus/rules/exporter_infra_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8000"]
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:4001"]
  - job_name: core-api
    static_configs:
      - targets: ["core-api:4002"]
  - job_name: messaging-api
    static_configs:
      - targets: ["messaging-api:4003"]
  - job_name: telegram-sm
    static_configs:
      - targets: ["telegram-sm:4005"]
  - job_name: campaign-orchestrator
    static_configs:
      - targets: ["campaign-orchestrator:4006"]
  - job_name: automation-engine
    static_configs:
      - targets: ["automation-engine:4007"]
  - job_name: notification-hub
    static_configs:
      - targets: ["notification-hub:4008"]
  - job_name: user-service
    static_configs:
      - targets: ["user-service:4009"]
  - job_name: ai-service
    static_configs:
      - targets: ["ai-service:4010"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics
